<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContratoExpress — Gerador de Contratos Profissionais</title>
    <meta name="description" content="Gere contratos profissionais em minutos. Prestação de serviço, freelancer, locação e NDA. Grátis e sem complicação." />
    <base href="/" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%234F46E5'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='20' font-weight='800' font-family='system-ui'>C</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(180deg,#0f0c29 0%,#1a1a6e 30%,#2563EB 60%,#38bdf8 100%);color:rgba(255,255,255,0.8);font-family:'Inter',system-ui,sans-serif;">
            <div style="text-align:center;">
                <div style="width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,0.2);backdrop-filter:blur(12px);display:inline-flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;margin-bottom:14px;border:1px solid rgba(255,255,255,0.3);">C</div>
                <p>Carregando ContratoExpress...</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:0;width:100%;padding:12px;background:#2563EB;color:white;text-align:center;z-index:1000;">
        Ocorreu um erro inesperado.
        <a href="" style="color:white;text-decoration:underline;">Recarregar</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        function printContractFrame() {
            var iframe = document.getElementById('contract-preview');
            if (iframe) {
                iframe.contentWindow.focus();
                iframe.contentWindow.print();
            }
        }
    </script>
</body>
</html>
