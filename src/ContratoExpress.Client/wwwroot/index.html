<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ContratoExpress — Gerador de Contratos Profissionais</title>
    <meta name="description" content="Gere contratos profissionais em minutos. Prestação de serviço, freelancer, locação e NDA. Grátis e sem complicação." />
    <base href="/" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%234F46E5'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='20' font-weight='800' font-family='system-ui'>C</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <div id="app">
        <style>
            .splash{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(180deg,#0f0c29 0%,#1a1a6e 30%,#2563EB 60%,#38bdf8 100%);color:rgba(255,255,255,0.8);font-family:'Inter',system-ui,sans-serif;overflow:hidden;position:relative}
            .splash::before{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(37,99,235,0.3);filter:blur(80px);animation:floatOrb 4s ease-in-out infinite}
            .splash::after{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(56,189,248,0.2);filter:blur(60px);animation:floatOrb 5s ease-in-out infinite reverse;top:60%;left:60%}
            .splash-content{text-align:center;z-index:1;animation:fadeInUp .8s ease-out}
            .splash-logo{width:min(400px,60vw);height:min(400px,60vw);animation:logoReveal 1s ease-out,logoPulse 2.5s ease-in-out .8s infinite;filter:drop-shadow(0 0 30px rgba(37,99,235,0.5))}
            .splash-title{font-size:28px;font-weight:800;color:#fff;margin:20px 0 6px;letter-spacing:-0.5px;animation:fadeInUp .8s ease-out .3s both}
            .splash-sub{font-size:14px;color:rgba(255,255,255,0.6);margin:0 0 30px;animation:fadeInUp .8s ease-out .5s both}
            .splash-loader{display:flex;gap:6px;justify-content:center;animation:fadeInUp .8s ease-out .7s both}
            .splash-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.6);animation:dotBounce 1.4s ease-in-out infinite}
            .splash-dot:nth-child(2){animation-delay:.2s}
            .splash-dot:nth-child(3){animation-delay:.4s}
            .splash-bar{width:200px;height:3px;background:rgba(255,255,255,0.1);border-radius:3px;margin:24px auto 0;overflow:hidden;animation:fadeInUp .8s ease-out .9s both}
            .splash-bar-fill{width:0;height:100%;background:linear-gradient(90deg,#38bdf8,#818cf8,#a78bfa);border-radius:3px;animation:loadBar 3s ease-in-out forwards .5s}
            @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
            @keyframes logoReveal{from{opacity:0;transform:scale(0.5) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0)}}
            @keyframes logoPulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 30px rgba(37,99,235,0.5))}50%{transform:scale(1.05);filter:drop-shadow(0 0 50px rgba(37,99,235,0.8))}}
            @keyframes dotBounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
            @keyframes loadBar{0%{width:0}50%{width:70%}100%{width:100%}}
            @keyframes floatOrb{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}
        </style>
        <div class="splash">
            <div class="splash-content">
                <img src="images/logo.png" alt="ContratoExpress" class="splash-logo" />
                <p class="splash-sub">Preparando seus contratos...</p>
                <div class="splash-loader">
                    <div class="splash-dot"></div>
                    <div class="splash-dot"></div>
                    <div class="splash-dot"></div>
                </div>
                <div class="splash-bar"><div class="splash-bar-fill"></div></div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:0;width:100%;padding:12px;background:#2563EB;color:white;text-align:center;z-index:1000;">
        Ocorreu um erro inesperado.
        <a href="" style="color:white;text-decoration:underline;">Recarregar</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        function printContractFrame() {
            var iframe = document.getElementById('contract-preview');
            if (iframe) {
                iframe.contentWindow.focus();
                iframe.contentWindow.print();
            }
        }

        function saveDraft(key, json) {
            try { localStorage.setItem(key, json); } catch (e) { }
        }
        function loadDraft(key) {
            try { return localStorage.getItem(key); } catch (e) { return null; }
        }
        function removeDraft(key) {
            try { localStorage.removeItem(key); } catch (e) { }
        }
    </script>
</body>
</html>
